name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

env:
  NODE_VERSION: "22.11.0"
  PNPM_VERSION: "9.12.0"
  REGISTRY: ghcr.io
  IMAGE_BFF: ghcr.io/${{ github.repository_owner }}/sdm-bff

jobs:
  bff-image:
    name: Publish BFF image
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      version: ${{ steps.meta.outputs.version }}
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BFF }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/bff/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=bff-release
          cache-to: type=gha,mode=max,scope=bff-release

  helm-chart:
    name: Package + publish Helm chart
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: bff-image
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.1

      - name: Set chart appVersion to release tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" deploy/helm/sdm/Chart.yaml
          sed -i "s/^version:.*/version: ${VERSION}/" deploy/helm/sdm/Chart.yaml

      - name: helm package
        run: |
          mkdir -p dist
          helm package deploy/helm/sdm -d dist

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: helm push (OCI)
        run: |
          helm push dist/sdm-*.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}

      - name: Attach chart to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sdm-*.tgz
          generate_release_notes: true
