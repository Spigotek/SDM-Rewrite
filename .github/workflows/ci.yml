name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22.11.0"
  PNPM_VERSION: "9.12.0"

jobs:
  workspace:
    name: lint + typecheck + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Lint
        run: pnpm -r lint

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

      - name: Build
        run: pnpm build

  helm-lint:
    name: helm chart lint + template
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.1

      - name: helm lint
        run: helm lint deploy/helm/sdm

      - name: helm template (dry-run render)
        run: helm template ci deploy/helm/sdm --debug > /tmp/manifests.yaml

      - name: Upload rendered manifests
        uses: actions/upload-artifact@v4
        with:
          name: helm-manifests
          path: /tmp/manifests.yaml
          retention-days: 7

  bff-image:
    name: BFF image — build (no push)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: workspace
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build BFF image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/bff/Dockerfile
          push: false
          tags: sdm-bff:ci
          cache-from: type=gha,scope=bff
          cache-to: type=gha,mode=max,scope=bff
          build-args: |
            GIT_SHA=${{ github.sha }}
            VERSION=${{ github.ref_name }}
