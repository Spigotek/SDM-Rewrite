# Default values for sdm chart. Override per environment.

nameOverride: ""
fullnameOverride: ""

image:
  registry: ghcr.io
  pullPolicy: IfNotPresent
  pullSecrets: []
  tag: "" # defaults to .Chart.AppVersion when empty (applies per-app unless overridden)

# ----- BFF -------------------------------------------------------------------
bff:
  enabled: true
  image:
    repository: spigotek/sdm-bff
    tag: ""
  replicaCount: 1
  port: 5174

  env:
    NODE_ENV: production
    BFF_PORT: "5174"
    BFF_SESSION_STORE_MODE: in-memory
    BFF_CA_SDM_USE_MOCKS: "false"
    PM_LOG_LEVEL: info

  envFromConfigMap: true
  envFromSecret: true

  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: 500m, memory: 512Mi }

  livenessProbe:
    httpGet: { path: /health, port: http }
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 3
    failureThreshold: 3

  readinessProbe:
    httpGet: { path: /readyz, port: http }
    initialDelaySeconds: 3
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3

  service:
    type: ClusterIP
    port: 80
    annotations: {}

  config:
    CA_SDM_BASE_URL: ""
    CORRELATION_HEADER: X-Correlation-ID
    TENANT_HEADER: X-CA-SDM-Tenant

  secret:
    BFF_REDIS_URL: ""
    CA_SDM_ACCESS_KEY: ""

  serviceAccount:
    create: true
    name: ""
    annotations: {}

  podAnnotations: {}
  podLabels: {}
  podSecurityContext:
    fsGroup: 1000
    runAsNonRoot: true
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    capabilities: { drop: [ALL] }

  nodeSelector: {}
  tolerations: []
  affinity: {}

# ----- Portal SPA ------------------------------------------------------------
portal:
  enabled: true
  image:
    repository: spigotek/sdm-portal
    tag: ""
  replicaCount: 1
  port: 8080

  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits: { cpu: 200m, memory: 128Mi }

  livenessProbe:
    httpGet: { path: /healthz, port: http }
    initialDelaySeconds: 5
    periodSeconds: 30
  readinessProbe:
    httpGet: { path: /healthz, port: http }
    initialDelaySeconds: 2
    periodSeconds: 10

  service:
    type: ClusterIP
    port: 80
    annotations: {}

  podAnnotations: {}
  podLabels: {}

# ----- Workspace SPA ---------------------------------------------------------
workspace:
  enabled: true
  image:
    repository: spigotek/sdm-workspace
    tag: ""
  replicaCount: 1
  port: 8080

  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits: { cpu: 200m, memory: 128Mi }

  livenessProbe:
    httpGet: { path: /healthz, port: http }
    initialDelaySeconds: 5
    periodSeconds: 30
  readinessProbe:
    httpGet: { path: /healthz, port: http }
    initialDelaySeconds: 2
    periodSeconds: 10

  service:
    type: ClusterIP
    port: 80
    annotations: {}

  podAnnotations: {}
  podLabels: {}

# ----- Ingress ---------------------------------------------------------------
# Routes /api/*, /auth/*, /me/* → BFF; everything else → SPA (per host).
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: portal.sdm.example.org
      service: portal # SPA service to route the "/" fallback to
    - host: workspace.sdm.example.org
      service: workspace
  bffPathPrefixes:
    - /api
    - /auth
    - /me
  tls: []
