{{- if and .Values.bff.enabled .Values.bff.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "sdm.bff.serviceAccountName" . }}
  labels:
    {{- include "sdm.bff.labels" . | nindent 4 }}
  {{- with .Values.bff.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
