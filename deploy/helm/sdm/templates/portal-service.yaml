{{- if .Values.portal.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sdm.portal.fullname" . }}
  labels:
    {{- include "sdm.portal.labels" . | nindent 4 }}
  {{- with .Values.portal.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.portal.service.type }}
  ports:
    - name: http
      port: {{ .Values.portal.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "sdm.portal.selectorLabels" . | nindent 4 }}
{{- end }}
